name: Diag Azure Tool-Calling (temp)

# TEMP diagnostic: does the prod Azure gpt-5.4-mini deployment support function/tool-calling?
# Reads AZURE_OPENAI_* from the runtime service vars (via RAILWAY_TOKEN) and calls the Azure
# chat/completions endpoint directly with a `tools` payload. Prints whether the model emits
# tool_calls. The API key is masked, never printed. Delete this workflow after use.

on:
  workflow_dispatch: {}

concurrency:
  group: railway-diag
  cancel-in-progress: false

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Probe Azure tool-calling
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RSVC: ${{ vars.RAILWAY_RUNTIME_SERVICE }}
        run: |
          set -e
          SVC="${RSVC:-clinicos-ai-runtime}"
          railway variables --service "$SVC" --json > rv.json 2>/dev/null || { echo "railway variables failed"; exit 1; }
          python3 - <<'PY'
          import json, os, subprocess, urllib.request
          v = json.load(open("rv.json"))
          ep  = (v.get("AZURE_OPENAI_ENDPOINT") or "").rstrip("/")
          dep = v.get("AZURE_OPENAI_DEPLOYMENT") or ""
          ver = v.get("AZURE_OPENAI_API_VERSION") or "2024-10-21"
          key = v.get("AZURE_OPENAI_API_KEY") or ""
          print("endpoint set:", bool(ep), "| deployment:", dep, "| api-version:", ver, "| key present:", bool(key))
          if not (ep and dep and key):
              print("MISSING Azure config"); raise SystemExit(1)
          # mask the key in logs
          print(f"::add-mask::{key}")
          url = f"{ep}/openai/deployments/{dep}/chat/completions?api-version={ver}"
          body = {
            "messages": [
              {"role": "system", "content": "Usa gli strumenti quando servono."},
              {"role": "user", "content": "Che tempo fa a Roma adesso? Chiama lo strumento get_weather."}
            ],
            "tools": [{
              "type": "function",
              "function": {
                "name": "get_weather",
                "description": "Ottiene il meteo attuale per una citta",
                "parameters": {"type": "object", "properties": {"city": {"type": "string"}}, "required": ["city"]}
              }
            }],
            "tool_choice": "auto"
          }
          req = urllib.request.Request(url, data=json.dumps(body).encode(), method="POST",
                headers={"Content-Type": "application/json", "api-key": key})
          try:
              with urllib.request.urlopen(req, timeout=45) as r:
                  resp = json.load(r)
          except urllib.error.HTTPError as e:
              print("HTTP", e.code); print(e.read().decode()[:800]); raise SystemExit(1)
          msg = resp.get("choices", [{}])[0].get("message", {})
          tcs = msg.get("tool_calls")
          print("=== RESULT ===")
          print("tool_calls present:", bool(tcs))
          if tcs:
              for tc in tcs:
                  fn = tc.get("function", {})
                  print("  ->", fn.get("name"), fn.get("arguments"))
              print("VERDICT: TOOL-CALLING SUPPORTED")
          else:
              print("content:", (msg.get("content") or "")[:200])
              print("VERDICT: no tool_calls returned (model answered in text)")
          print("finish_reason:", resp.get("choices", [{}])[0].get("finish_reason"))
          PY
