name: Diag DataQuery Plans (temp)
on:
  workflow_dispatch: {}
concurrency:
  group: railway-diag
  cancel-in-progress: false
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Emit data_query plans
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RSVC: ${{ vars.RAILWAY_RUNTIME_SERVICE }}
        run: |
          set -e
          SVC="${RSVC:-clinicos-ai-runtime}"
          railway variables --service "$SVC" --json > rv.json 2>/dev/null
          TOKEN=$(python3 -c "import json;print(json.load(open('rv.json')).get('AI_RUNTIME_SERVICE_TOKEN',''))")
          echo "::add-mask::$TOKEN"
          URL="https://clinicos-ai-runtime-production.up.railway.app/v1/assistant/plan"
          SCHEMA='[{"name":"query_data","args":{"plan":"object"}},{"name":"query_appointments_today","args":{}},{"name":"get_patient_vital_signs","args":{"patientId":"string"}}]'
          for Q in "quante camere sono occupate?" "che appuntamenti ci sono oggi?" "andamento dei parametri degli ultimi 7 giorni del paziente Folli"; do
            echo "=================================================="
            echo "Q: $Q"
            python3 - "$Q" "$SCHEMA" > body.json <<'PY'
          import json,sys
          print(json.dumps({"question":sys.argv[1],"toolSchema":json.loads(sys.argv[2])}))
          PY
            curl -sS -m 45 -X POST "$URL" -H 'Content-Type: application/json' -H "Authorization: Bearer $TOKEN" --data @body.json
            echo
          done
