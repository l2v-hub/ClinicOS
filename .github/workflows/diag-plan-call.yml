name: Diag Plan Call (read-only)

# READ-ONLY: chiama /v1/assistant/plan sul runtime col service token e stampa lo status
# e il CORPO dell'errore 500 (contiene str(ex)[:200] del runtime — la causa reale).

on:
  workflow_dispatch: {}

jobs:
  call:
    runs-on: ubuntu-latest
    steps:
      - name: Call assistant plan
        env:
          TOKEN: ${{ secrets.AI_RUNTIME_SERVICE_TOKEN }}
          RT: https://clinicos-ai-runtime-production.up.railway.app
        run: |
          if [ -z "$TOKEN" ]; then echo "::warning::AI_RUNTIME_SERVICE_TOKEN secret non disponibile"; fi
          echo "=== POST /v1/assistant/plan ==="
          curl -s -o /tmp/plan.json -w "HTTP=%{http_code}\n" --max-time 40 \
            -X POST "$RT/v1/assistant/plan" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"question":"quali allergie ha il paziente","toolSchema":[],"roles":["operatore"]}'
          echo "--- body ---"; cat /tmp/plan.json; echo
          echo "=== POST /v1/assistant/compose ==="
          curl -s -o /tmp/comp.json -w "HTTP=%{http_code}\n" --max-time 40 \
            -X POST "$RT/v1/assistant/compose" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"question":"q","results":[{"a":1}],"sources":[],"language":"it"}'
          echo "--- body ---"; cat /tmp/comp.json; echo
