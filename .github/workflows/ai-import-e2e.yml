name: AI Import E2E Gate

# REQ-020: quality gate for the AI discharge-import flow.
# Deterministic with the mock provider; no real key or clinical data in CI.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for leaked API keys
        run: |
          # Fail if a Google API key or a committed GEMINI key value appears in tracked files.
          if grep -rInE 'AIza[0-9A-Za-z_-]{20,}' --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "::error::Potential API key found in repository"; exit 1
          fi
          if grep -rInE 'GEMINI_API_KEY\s*=\s*["'\'']?AIza' --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "::error::GEMINI_API_KEY value committed"; exit 1
          fi
          echo "Secret scan clean."

  gate:
    runs-on: ubuntu-latest
    needs: secret-scan
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clinicos_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clinicos_test?schema=public
      AI_PROVIDER: mock
      NODE_OPTIONS: --max-old-space-size=4096
      # The backend no longer extracts in-process: it delegates to the clinicos-ai-runtime
      # service (started below) over HTTP. For the deterministic gate we run that runtime
      # with the mock provider on every role, so the E2E flow is real but offline.
      AI_RUNTIME_URL: http://127.0.0.1:8000
      AI_RUNTIME_SERVICE_TOKEN: ci-mock-runtime-token
      AI_OCR_MODEL: mock:mock
      AI_EXTRACTION_MODEL: mock:mock
      AI_AGENT_MODEL: mock:mock
      AI_REPAIR_MODEL: mock:mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: npm ci || npm install
      - name: Browser-e2e CI-path config guard (#267)
        # Deterministic assertions on the browser-e2e wiring: local VITE_API_URL,
        # lockfile-installed Playwright, no fallback install, no continue-on-error.
        run: node --test scripts/ci/ai-import-e2e-config.test.mjs
      - name: Apply migrations
        run: node node_modules/prisma/build/index.js migrate deploy --schema=prisma/schema.prisma
      - name: Build (frontend + backend)
        run: npm run build
      - name: Install AI runtime deps
        run: pip install -r clinicos-ai-runtime/requirements.txt
      - name: Start AI runtime (deterministic mock provider)
        working-directory: clinicos-ai-runtime
        run: |
          PORT=8000 python -m clinicos_ai.main > /tmp/ai-runtime.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/v1/runtime/health > /dev/null; then
              echo "AI runtime healthy"; exit 0
            fi
            sleep 1
          done
          echo "::error::AI runtime failed to start"; cat /tmp/ai-runtime.log; exit 1
      - name: Backend unit tests
        run: npm --prefix backend test
      - name: Import E2E (API, deterministic)
        run: node node_modules/tsx/dist/cli.mjs e2e/import-e2e.mjs
      - name: New/existing targeting E2E (REQ-021, confirm new vs existing)
        run: node node_modules/tsx/dist/cli.mjs e2e/new-vs-existing-smoke.mjs
      - name: Async import E2E (REQ-022, 202 + worker + reclaim + retry)
        run: node node_modules/tsx/dist/cli.mjs e2e/async-smoke.mjs
      - name: Therapy import E2E (#156, parser -> seed terapiaImport -> confirm -> PatientTherapy)
        run: node node_modules/tsx/dist/cli.mjs e2e/therapy-import-api.mjs

  browser-e2e:
    runs-on: ubuntu-latest
    needs: gate
    # #267: blocking job — a red browser run must fail the workflow, not hide behind
    # continue-on-error. The flow is hermetic (local backend + mock runtime), so it is
    # deterministic like the gate above.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clinicos_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clinicos_test?schema=public
      AI_PROVIDER: mock
      PORT: 3001
      NODE_OPTIONS: --max-old-space-size=4096
      # Backend delegates extraction to the clinicos-ai-runtime service (started below with
      # the mock provider) — same wiring as the gate job. Runtime is on :8000, backend on :3001.
      AI_RUNTIME_URL: http://127.0.0.1:8000
      AI_RUNTIME_SERVICE_TOKEN: ci-mock-runtime-token
      AI_OCR_MODEL: mock:mock
      AI_EXTRACTION_MODEL: mock:mock
      AI_AGENT_MODEL: mock:mock
      AI_REPAIR_MODEL: mock:mock
      # #267: pin the frontend build to the LOCAL backend. Without this, the production
      # Vite build falls back to the real Railway backend (frontend/src/config.ts) and the
      # browser test silently drives production instead of the mock stack below.
      VITE_API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci || npm install
      - run: node node_modules/prisma/build/index.js migrate deploy --schema=prisma/schema.prisma
      - run: node node_modules/prisma/build/index.js db seed --schema=prisma/schema.prisma || npm --prefix backend run db:seed || true
      - run: npm run build
      - name: Install Playwright Chromium
        # #267: playwright is a root devDependency installed by `npm ci` from the lockfile —
        # single deterministic invocation, no MODULE_NOT_FOUND, no dynamic fallback install.
        run: node node_modules/playwright/cli.js install --with-deps chromium
      - name: Install AI runtime deps
        run: pip install -r clinicos-ai-runtime/requirements.txt
      - name: Start AI runtime + backend + frontend
        # All three are backgrounded in ONE step so they share a lifetime and survive together
        # into the browser step (a runtime started in a prior step can be reaped on step exit).
        run: |
          ( cd clinicos-ai-runtime && PORT=8000 python -m clinicos_ai.main > /tmp/ai-runtime.log 2>&1 & )
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:8000/v1/runtime/health > /dev/null && { echo "AI runtime healthy"; break; }; sleep 1; done
          node backend/dist/server.js > /tmp/backend.log 2>&1 &
          npm --prefix frontend run preview -- --port 5173 --host > /tmp/frontend.log 2>&1 &
          npx --yes wait-on http://localhost:3001/health http://localhost:5173 || sleep 10
      - name: Browser happy-path screenshots
        run: mkdir -p artifacts && node e2e/import-happy-path.mjs artifacts
      - name: Assert AI runtime mock received a document-job call
        # #133 AC2: prove the backend actually reached the mock runtime (not just the health check).
        # The runtime binds 0.0.0.0 (IPv4); the backend now connects via 127.0.0.1 to avoid Node's
        # localhost -> ::1 resolution. uvicorn logs each request, so a document-jobs line must appear.
        run: |
          echo "===== AI runtime access log ====="; cat /tmp/ai-runtime.log || true
          if grep -qE "/v1/document-jobs" /tmp/ai-runtime.log; then
            echo "OK: mock runtime received a document-job request"
          else
            echo "::error::runtime mock never received a document-job call — backend could not reach it (only health checks seen)"
            exit 1
          fi
      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "===== AI runtime ====="; tail -n 60 /tmp/ai-runtime.log || true
          echo "===== backend ====="; tail -n 120 /tmp/backend.log || true
          echo "===== recent import jobs (status/stage/error) ====="
          node -e "import('./backend/dist/lib/prisma.js').then(async m=>{const j=await m.prisma.importJob.findMany({orderBy:{createdAt:'desc'},take:4,select:{id:true,status:true,stage:true,error:true}});console.log(JSON.stringify(j,null,2));await m.prisma.\$disconnect()}).catch(e=>{console.error(String(e));process.exit(0)})" || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-import-e2e-screenshots
          path: artifacts/*.png
          if-no-files-found: ignore

  real-provider:
    runs-on: ubuntu-latest
    needs: gate
    # Self-skips when the secret is absent; never fails the pipeline on a missing key.
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      AI_PROVIDER: google
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci || npm install
      - run: npm run build:backend
      - name: Real-provider extraction (gated, synthetic)
        run: node e2e/real-provider.test.mjs
