name: Frontend Secret Scan

# Issue #224 — fail the build if a secret / provider credential is hardcoded in the frontend source
# or inlined into the built bundle (Vite inlines import.meta.env.VITE_* in cleartext).

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'scripts/security/scan-frontend-secrets.mjs'
      - '.github/workflows/frontend-secret-scan.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'scripts/security/scan-frontend-secrets.mjs'
      - '.github/workflows/frontend-secret-scan.yml'
  workflow_dispatch: {}

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Scanner self-test (detection + allowlist)
        run: node scripts/security/scan-frontend-secrets.mjs --self-test

      - name: Scan frontend source
        run: node scripts/security/scan-frontend-secrets.mjs frontend/src frontend/index.html

      - name: Install dependencies
        run: npm ci

      - name: Build frontend bundle
        run: npm run build:frontend

      - name: Scan built bundle (dist)
        run: node scripts/security/scan-frontend-secrets.mjs frontend/dist
