name: Diag Assistant Plan (temp)

# TEMP diagnostic (016 F1): confirms, from a GitHub runner (which reaches Railway),
# 1) the CURRENT backend assistant flags, and
# 2) whether the runtime /v1/assistant/plan actually returns a VALID plan with the
#    configured 'agent' model (azure:gpt-5.4-mini).
# The service token is read from the runtime service vars and masked — never printed.
# Delete this workflow after use.

on:
  workflow_dispatch: {}

concurrency:
  group: railway-diag
  cancel-in-progress: false

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Backend assistant flags (clinicos-backend)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          BSVC: ${{ vars.RAILWAY_SERVICE }}
        run: |
          set -e
          SVC="${BSVC:-clinicos-backend}"
          echo "== backend flags (service $SVC) =="
          railway variables --service "$SVC" --json > bvars.json 2>/dev/null || { echo "railway variables failed"; exit 1; }
          python3 - <<'PY'
          import json
          v = json.load(open("bvars.json"))
          keys = ["AI_ASSISTANT_LLM_ENABLED","AI_ASSISTANT_PLAN_ENABLED","AI_ASSISTANT_COMPOSE_ENABLED",
                  "AI_ASSISTANT_PLAN_MODEL","AI_ASSISTANT_COMPOSE_MODEL","AI_RUNTIME_URL","AI_ASSISTANT_TIMEOUT_MS"]
          for k in keys:
              val = v.get(k, "<UNSET>")
              if k == "AI_RUNTIME_URL":
                  val = (val or "")[:60]
              print(f"{k} = {val}")
          print("AI_RUNTIME_SERVICE_TOKEN present:", "AI_RUNTIME_SERVICE_TOKEN" in v)
          PY

      - name: Call runtime /v1/assistant/plan
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RSVC: ${{ vars.RAILWAY_RUNTIME_SERVICE }}
        run: |
          set -e
          SVC="${RSVC:-clinicos-ai-runtime}"
          railway variables --service "$SVC" --json > rvars.json 2>/dev/null || { echo "railway variables failed"; exit 1; }
          TOKEN=$(python3 -c "import json;print(json.load(open('rvars.json')).get('AI_RUNTIME_SERVICE_TOKEN',''))")
          if [ -z "$TOKEN" ]; then echo "::error::runtime service token not found"; exit 1; fi
          echo "::add-mask::$TOKEN"
          AGENT=$(python3 -c "import json;v=json.load(open('rvars.json'));print(v.get('AGNOS_LLM_PROVIDER','?'),v.get('AGNOS_LLM_MODEL', v.get('AI_AGENT_MODEL','?')))")
          echo "runtime agent (provider model): $AGENT"
          URL="https://clinicos-ai-runtime-production.up.railway.app/v1/assistant/plan"
          for Q in "quali sono le allergie di Folli?" "quali pazienti sono allergici al paracetamolo?" "mostrami le terapie di Folli"; do
            python3 - "$Q" > body.json <<'PY'
          import json,sys
          q=sys.argv[1]
          schema=[
            {"name":"get_patient_allergies","args":{"patientId":"string"}},
            {"name":"get_patient_therapies","args":{"patientId":"string"}},
            {"name":"get_patient_vital_signs","args":{"patientId":"string","label":"string?","systolicMin":"number?"}},
            {"name":"get_patient_timeline","args":{"patientId":"string"}},
            {"name":"get_patient_appointments","args":{"patientId":"string"}},
            {"name":"search_clinical_sections","args":{"patientId":"string","sectionKey":"string?","query":"string"}},
            {"name":"search_documents","args":{"patientId":"string?","query":"string"}},
            {"name":"search_patients","args":{"query":"string"}},
            {"name":"search_across_patients","args":{"query":"string?","systolicMin":"number?"}},
            {"name":"correlate_structured_data","args":{"allergy":"string?"}},
            {"name":"query_appointments_today","args":{}},
          ]
          print(json.dumps({"question":q,"toolSchema":schema}))
          PY
            echo "==================================================="
            echo "Q: $Q"
            HTTP=$(curl -sS -o resp.json -w '%{http_code}' -m 45 -X POST "$URL" \
              -H 'Content-Type: application/json' -H "Authorization: Bearer $TOKEN" \
              --data @body.json || echo "000")
            echo "HTTP $HTTP"
            echo "--- response ---"
            cat resp.json 2>/dev/null || echo "(no body)"
            echo
          done
